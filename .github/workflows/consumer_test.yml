name: Consumer Tests
on:
  workflow_call:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        consumer: ["process_description", "score", "module_template"]

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4.2.2


      - name: Build and run dev container task
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/eclipse-score/devcontainer@v1.2.0
          push: never
          # The pipefail ensures that non 0 exit codes inside the pytest execution get carried into the pipe
          # & make the tests red in the end. Without this we only would check the exit code of the 'tee' command.
          runCmd: |
            set -euxo pipefail
            uv venv && uv pip install -r src/requirements.txt

            mkdir -p reports

            export FORCE_COLOR="1"
            export TERM="xterm-256color"
            export PYTHONUNBUFFERED="1"
            export CONSUMER="${{ matrix.consumer }}"
            export PYTHONPATH=.
            uv run pytest -s -v src/tests/ \
              --repo="$CONSUMER" \
              --junitxml="reports/${{ matrix.consumer }}.xml" \
              | tee "reports/${{ matrix.consumer }}.log"

      - name: Upload consumer test report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: tests-${{ matrix.consumer }}
          path: reports/

  summarize:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Prepare consumer report directory
        run: |
          mkdir -p tests-report

      - name: Download individual consumer reports
        uses: actions/download-artifact@v4
        with:
          pattern: tests-*
          path: tests-report
          merge-multiple: true

      - name: Upload bundled consumer report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: tests-report
          path: tests-report
